# ═══════════════════════════════════════════════════════════════════
# kube-prometheus-stack Helm values
# ═══════════════════════════════════════════════════════════════════
# Prometheus + Grafana + Alertmanager + Node Exporter + kube-state-metrics
# ═══════════════════════════════════════════════════════════════════

# ── Prometheus ──────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    # Retention period
    retention: 15d
    retentionSize: "5GB"

    # Resource limits
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

    # Scrape all ServiceMonitors across namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false

    # Storage (persistent)
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: managed-csi
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

    # Additional scrape configs for our app
    additionalScrapeConfigs:
      - job_name: 'dodo-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names: ['dodo-app']
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: (.+)
            replacement: $1
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)

# ── Grafana ────────────────────────────────────────────────────
grafana:
  adminUser: admin
  adminPassword: DodoGrafana2026!

  # Persistence
  persistence:
    enabled: true
    size: 5Gi
    storageClassName: managed-csi

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi

  # Additional data sources
  additionalDataSources:
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
      jsonData:
        maxLines: 1000

    - name: Jaeger
      type: jaeger
      access: proxy
      url: http://jaeger-query.monitoring:16686

  # Dashboard providers
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: 'dodo-dashboards'
          orgId: 1
          folder: 'Dodo Payments'
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/dodo

  # Dashboard JSON files (mounted via ConfigMap)
  dashboardsConfigMaps:
    dodo: "grafana-dodo-dashboards"

  # Ingress for Grafana
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
    hosts:
      - grafana.dodo.example.com

# ── Alertmanager ───────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  config:
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical-slack'
          repeat_interval: 1h
        - match:
            severity: warning
          receiver: 'default'

    receivers:
      - name: 'default'
        # Default: no notification (can add email/webhook)

      - name: 'critical-slack'
        slack_configs:
          - api_url: 'https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK'
            channel: '#dodo-alerts'
            title: '🚨 [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: >-
              *Namespace:* {{ .CommonLabels.namespace }}
              *Description:* {{ .CommonAnnotations.summary }}
              *Severity:* {{ .CommonLabels.severity }}
            send_resolved: true

# ── Node Exporter ──────────────────────────────────────────────
nodeExporter:
  enabled: true

# ── kube-state-metrics ─────────────────────────────────────────
kubeStateMetrics:
  enabled: true
