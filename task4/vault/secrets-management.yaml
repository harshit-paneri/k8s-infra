# ═══════════════════════════════════════════════════════════════════
# HashiCorp Vault — Secrets Management
# ═══════════════════════════════════════════════════════════════════
# Vault provides centralized, audited, and dynamic secrets management.
# This config sets up Vault with K8s auth and secret injection.
# ═══════════════════════════════════════════════════════════════════

# ── Option 1: HashiCorp Vault (Helm) ────────────────────────────

# Install command:
# helm repo add hashicorp https://helm.releases.hashicorp.com
# helm upgrade --install vault hashicorp/vault \
#   --namespace vault --create-namespace \
#   --values task4/vault/vault-values.yaml

# vault-values.yaml (for Helm install)
# ---
# server:
#   dev:
#     enabled: true
#   resources:
#     requests:
#       cpu: 100m
#       memory: 256Mi
#     limits:
#       cpu: 250m
#       memory: 512Mi
#
# injector:
#   enabled: true
#   resources:
#     requests:
#       cpu: 50m
#       memory: 64Mi
#     limits:
#       cpu: 100m
#       memory: 128Mi

# ── Vault Policy for Dodo App ───────────────────────────────────
# Save as vault-policy.hcl and apply:
# vault policy write dodo-policy vault-policy.hcl

# path "secret/data/dodo/*" {
#   capabilities = ["read"]
# }
#
# path "secret/metadata/dodo/*" {
#   capabilities = ["read", "list"]
# }

---
# ═══════════════════════════════════════════════════════════════════
# Option 2: Azure Key Vault + Secrets Store CSI Driver
# ═══════════════════════════════════════════════════════════════════
# Preferred for Azure-native deployments. Secrets stay in Azure.
# ═══════════════════════════════════════════════════════════════════

# SecretProviderClass — maps Azure Key Vault secrets to K8s
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: dodo-app
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""     # Fill with AKS managed identity client ID
    keyvaultName: "dodo-keyvault"
    cloudName: "AzurePublicCloud"
    objects: |
      array:
        - |
          objectName: db-username
          objectType: secret
          objectVersion: ""
        - |
          objectName: db-password
          objectType: secret
          objectVersion: ""
    tenantId: ""                   # Fill with Azure tenant ID

  # Sync Azure KV secrets to K8s Secrets (optional)
  secretObjects:
    - secretName: db-credentials-kv
      type: Opaque
      data:
        - objectName: db-username
          key: DB_USER
        - objectName: db-password
          key: DB_PASSWORD

---
# ═══════════════════════════════════════════════════════════════════
# Vault Sidecar Injection Example
# ═══════════════════════════════════════════════════════════════════
# This shows how to annotate a deployment for Vault agent injection.
# The Vault injector mutates the pod to add a sidecar that mounts secrets.
# ═══════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-with-vault
  namespace: dodo-app
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-vault-demo
  template:
    metadata:
      labels:
        app: backend-vault-demo
      annotations:
        # ── Vault Agent Injection annotations ──────────────
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "dodo-app"
        vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/dodo/db"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "secret/data/dodo/db" -}}
          export DB_USER="{{ .Data.data.username }}"
          export DB_PASSWORD="{{ .Data.data.password }}"
          {{- end }}
    spec:
      serviceAccountName: dodo-backend-sa
      containers:
        - name: backend
          image: dodo-backend:latest
          ports:
            - containerPort: 8000
          command: ["/bin/sh", "-c"]
          args:
            - source /vault/secrets/db-creds && uvicorn app.main:app --host 0.0.0.0 --port 8000
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

---
# Service Account for Vault auth
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dodo-backend-sa
  namespace: dodo-app
  labels:
    app.kubernetes.io/part-of: dodo-payments
