# PostgreSQL StatefulSet with Persistent Storage (Bonus: StatefulSet)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgresql
  namespace: dodo-app
  labels:
    app: postgresql
    app.kubernetes.io/part-of: dodo-payments
spec:
  serviceName: postgresql-service
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
        app.kubernetes.io/part-of: dodo-payments
    spec:
      containers:
        - name: postgresql
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          # ── Resource Limits ─────────────────────────────────
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # ── Health Probes ───────────────────────────────────
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 9      # 10s + 9*10s = 100s max startup
          # ── Volume Mounts ───────────────────────────────────
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  # ── Volume Claim Template (dynamic provisioning) ──────────────
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: managed-csi    # Azure Disk CSI driver
        resources:
          requests:
            storage: 5Gi

---
# Headless Service for StatefulSet (stable DNS)
apiVersion: v1
kind: Service
metadata:
  name: postgresql-service
  namespace: dodo-app
  labels:
    app: postgresql
    app.kubernetes.io/part-of: dodo-payments
spec:
  type: ClusterIP
  clusterIP: None    # Headless — DNS resolves directly to Pod IP
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
