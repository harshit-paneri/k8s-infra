# NGINX Ingress — path-based routing for frontend and backend
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dodo-ingress
  namespace: dodo-app
  labels:
    app.kubernetes.io/part-of: dodo-payments
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    # TLS (enable when cert-manager is set up)
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  rules:
    - host: dodo.example.com
      http:
        paths:
          # Backend API routes
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          # Frontend routes (catch-all)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
  # TLS configuration (uncomment when using cert-manager)
  # tls:
  #   - hosts:
  #       - dodo.example.com
  #     secretName: dodo-tls-secret
